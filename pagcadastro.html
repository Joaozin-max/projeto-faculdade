<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Cafeteria</title>
  <link rel="stylesheet" href="cadastro.css">
</head>
<body>

<section class="register-page">
  <div class="register-container">

    <div class="register-left">
      <div class="overlay">
        <h2>Crie sua conta ☕</h2>
        <p>Entre para nossa cafeteria e aproveite uma experiência especial.</p>
      </div>
    </div>

    <div class="register-right">
      <div class="register-box">
        <span class="tag">Cafeteria Especial</span>
        <h1>Criar conta</h1>
        <p class="subtitle">Preencha seus dados para continuar.</p>

        <form id="formCadastro">
          <div class="input-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>
          </div>

          <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" required>
          </div>

          <div class="input-group">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" placeholder="Digite seu telefone" required>
          </div>

          <div class="input-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Crie uma senha" required>
          </div>

          <div class="input-group">
            <label for="confirmar-senha">Confirmar senha</label>
            <input type="password" id="confirmar-senha" placeholder="Confirme sua senha" required>
          </div>

          <button class="btn" type="submit">Cadastrar</button>
        </form>

        <p class="account">
          Já tem conta? <a href="indeex.html">Entrar</a>
        </p>
      </div>
    </div>

  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

</body>
</html>
