<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café automatizado</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>

</head>
<body>
      <nav class="navbar">
    <div class="logo">
      <span>Café Autômato</span>
    </div>

    <div class="links">
      <a href="#home">Início</a>
      <a href="#cardapio">Cardápio</a>
      <a href="#">Nossa História</a>
    </div>

    <button class="cart-icon" id="abrirCarrinho" type="button" aria-label="Abrir Carrinho">
      🛒 <span id="contadorCarrinho">0</span>
    </button>
  </nav>

  <section class="cafeAutomatizado" id ="home">
    <div class="bemVindo">
      <small>BEM-VINDO AO</small>
      <h1>Café Autômatizado</h1>
      <p>
        Onde a tradição artesanal encontra a inovação tecnológica.
        Cada xícara, uma experiência perfeita.
      </p>
      <a href="#" class="btn" onclick="Cardapio()">Ver Cardápio</a>
    </div>
  </section>

<section id="cardapio" class="cardapio">
      <p class="subtitulo">NOSSO</p>
      <h2>Cardápio</h2>

      <div class="categorias">
        <button class="categoria ativa" data-cat="cafes" type="button">Cafés</button>
        <button class="categoria" data-cat="especiais" type="button">Especiais</button>
        <button class="categoria" data-cat="doces" type="button">Doces</button>
        <button class="categoria" data-cat="salgados" type="button">Salgados</button>
      </div>

      <div class="grid-cardapio" id="gridCardapio"></div>
    </section>



<div id="overlayCarrinho" class="overlay-carrinho"></div>

    <aside id="carrinho" class="carrinho" aria-label="Carrinho de compras">
      <div class="carrinho-topo">
        <h3>Seu Pedido</h3>
        <button id="fecharCarrinho" class="fechar-carrinho" type="button" aria-label="Fechar carrinho">✕</button>
      </div>

      <div id="itensCarrinho" class="itens-carrinho"></div>

      <div class="total">
        <span>Total:</span>
        <span id="total">R$ 0,00</span>
      </div>

      <button id="finalizar" type="button">Finalizar Pedido</button>
    </aside>>
</body>
</html>
